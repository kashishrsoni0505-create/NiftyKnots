<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Cart | Nifty Knots 🧶</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { color-scheme: light !important; }
        body { background-color: #FFF9E3 !important; font-family: 'Quicksand', sans-serif; color: #444 !important; }
        .glass-card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: none; }
        .btn-confirm { background: #C9B1FF; color: white; border-radius: 50px; font-weight: bold; padding: 16px; width: 100%; border: none; font-size: 1.1rem; }
        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.95rem; }
        .delete-btn { color: #ff6b6b; cursor: pointer; margin-left: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container py-4">
    <h3 class="fw-bold mb-4" style="color: #C9B1FF;">Your Order 🧶</h3>

    <div class="glass-card mb-4">
        <h6 class="fw-bold mb-3">Items in Cart</h6>
        <div id="cart-list"></div>
        <div class="d-flex justify-content-between fw-bold border-top pt-3 mt-2">
            <span>Total Amount:</span>
            <span id="final-total" style="color: #C9B1FF; font-size: 1.2rem;">₹0</span>
        </div>
    </div>

    <div class="glass-card">
        <h6 class="fw-bold mb-3">Delivery details</h6>
        <form id="orderForm">
            <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>
            <div class="input-group mb-3">
                <span class="input-group-text">+91</span>
                <input type="tel" name="phone" class="form-control" placeholder="WhatsApp Number" required>
            </div>
            <input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>
            
            <select name="state" id="stateSelect" class="form-select mb-3" onchange="calcTotal()" required>
                <option value="Gujarat">Gujarat (₹50 Shipping)</option>
                <option value="Other">Outside Gujarat (₹60 Shipping)</option>
            </select>

            <input type="text" name="city" id="cityInput" class="form-control mb-3" placeholder="City" oninput="calcTotal()" required>
            <textarea name="address" id="addressInput" class="form-control mb-4" placeholder="House No, Landmark, Area..." oninput="calcTotal()" required></textarea>

            <button type="submit" id="submitBtn" class="btn-confirm">Confirm & Proceed ✨</button>
        </form>
    </div>
</div>

<script>
    const cartKey = 'cart'; 

    function loadCart() {
        const cart = JSON.parse(localStorage.getItem(cartKey)) || [];
        const container = document.getElementById('cart-list');
        
        if (cart.length === 0) {
            container.innerHTML = "<p class='text-center text-muted py-3'>Your cart is empty!</p>";
            document.getElementById('final-total').innerText = "₹0";
            return;
        }

        container.innerHTML = cart.map((item, index) => `
            <div class="item-row">
                <div>
                    <span class="fw-bold">${item.name}</span><br>
                    <small class="text-muted">₹${item.price} x ${item.qty}</small>
                </div>
                <div class="d-flex align-items-center">
                    <span class="fw-bold">₹${item.price * item.qty}</span>
                    <i class="fa-solid fa-trash-can delete-btn" onclick="removeItem(${index})"></i>
                </div>
            </div>
        `).join('');
        calcTotal();
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
        cart.splice(index, 1);
        localStorage.setItem(cartKey, JSON.stringify(cart));
        loadCart();
    }

    function calcTotal() {
        const cart = JSON.parse(localStorage.getItem(cartKey)) || [];
        const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        if(subtotal === 0) return 0;

        const state = document.getElementById('stateSelect').value;
        const city = document.getElementById('cityInput').value.toLowerCase();
        const address = document.getElementById('addressInput').value.toLowerCase();
        
        let shipping = (state === "Gujarat") ? 50 : 60;
        const local = ['new ranip', 'ranip', 'gota', 'chandlodiya', 'chenpur'];
        if (local.some(l => city.includes(l) || address.includes(l))) { shipping = 0; }

        const total = subtotal + shipping;
        document.getElementById('final-total').innerText = "₹" + total;
        return total;
    }

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Saving Order...";

        const cart = JSON.parse(localStorage.getItem(cartKey)) || [];
        const total = calcTotal();
        const formData = new FormData(this);
        const data = Object.fromEntries(formData);
        
        data.total = total;
        data.items = cart.map(i => `${i.name}(${i.qty})`).join(', ');
        data.full_address = `${data.address}, ${data.city}, ${data.state}`;

        // UPDATED URL
        fetch('https://script.google.com/macros/s/AKfycbxh2H-50dBWSo_8YI0vvmkj2CPpKSfpwOeVU7urciKh40V0s3lPlgvMseR9uskxftTG/exec', {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        }).then(() => {
            alert("Order placed! Sending to payment...");
            window.location.href = `payment.html?amt=${total}`;
        }).catch(() => {
            btn.disabled = false;
            btn.innerText = "Confirm & Proceed ✨";
        });
    };

    window.onload = loadCart;
</script>
</body>
</html>
