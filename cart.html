<!DOCTYPE html>
<html>
<head>
<title>Cart | Nifty Knots</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
body{ background: linear-gradient(135deg,#FFF3AD,#FFCAF2,#C9B1FF); font-family:'Quicksand'; }
.container-box{ max-width:800px; margin:40px auto; background:white; padding:30px; border-radius:20px; box-shadow:0 6px 20px rgba(0,0,0,0.1); }
.card{ border:none; border-radius:15px; padding:10px; background:#fff; box-shadow:0 4px 10px rgba(0,0,0,0.08); mb-3; }
.card img{ height:100px; object-fit:contain; }
.form-control { border-radius: 10px; border: 1px solid #FFCAF2; }
</style>
</head>
<body>

<button onclick="history.back()" class="btn btn-secondary m-3">← Back</button>

<div class="container-box">
    <h2 class="text-center mb-4">🛒 Your Cart</h2>
    <div id="box"></div>
    <h4 id="total" class="text-center mt-3">Total: ₹0</h4>

    <div id="checkout-section" style="display:none;" class="mt-4 border-top pt-3">
        <h5>Shipping Details 🚚</h5>
        <input type="text" id="custName" class="form-control mb-2" placeholder="Full Name" required>
        <input type="email" id="custEmail" class="form-control mb-2" placeholder="Email Address" required>
        <input type="text" id="custPhone" class="form-control mb-2" placeholder="Phone Number" required>
        <textarea id="custAddress" class="form-control mb-3" placeholder="Full Address with Pincode" required></textarea>
        
        <button onclick="processOrder()" class="btn btn-success w-100 fw-bold">Confirm & Pay via UPI 💳</button>
    </div>

    <button id="show-form-btn" onclick="showForm()" class="btn btn-primary w-100 mt-3">Proceed to Checkout</button>
</div>

<script>
// --- CONFIGURATION ---
const scriptURL = 'https://script.google.com/macros/s/AKfycbylj9zYjbDqdq2sD18ligs2o5fwMuuy0gZNZgDlZ3RTIQ9I2Bmk5aMULnz1Y17OBn0o/exec';
const myUpiId = "kashishrsoni0505@okaxis"; // <--- STEP 1: Put your UPI ID here!

let currentUser = JSON.parse(localStorage.getItem("currentUser"));
let cartKey = currentUser ? "cart_" + currentUser.email : "cart";
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
let total = 0;

function renderCart() {
    let box = document.getElementById("box");
    box.innerHTML = "";
    total = 0;
    
    if(cart.length === 0) {
        box.innerHTML = "<h5 class='text-center'>Your cart is empty 🛒</h5>";
        document.getElementById("show-form-btn").style.display = "none";
        return;
    }

    cart.forEach((p, i) => {
        total += p.price * p.qty;
        box.innerHTML += `
            <div class="card d-flex flex-row align-items-center gap-3 mb-2">
                <img src="${p.img}">
                <div class="flex-grow-1">
                    <h6 class="mb-0">${p.name}</h6>
                    <small>₹${p.price} x ${p.qty}</small>
                </div>
                <button onclick="removeItem(${i})" class="btn btn-sm btn-outline-danger">Remove</button>
            </div>`;
    });
    document.getElementById("total").innerText = "Total: ₹" + total;
}

function showForm() {
    document.getElementById('checkout-section').style.display = 'block';
    document.getElementById('show-form-btn').style.display = 'none';
}

function removeItem(i) {
    cart.splice(i, 1);
    localStorage.setItem(cartKey, JSON.stringify(cart));
    renderCart();
}

function processOrder() {
    const name = document.getElementById('custName').value;
    const email = document.getElementById('custEmail').value;
    const phone = document.getElementById('custPhone').value;
    const address = document.getElementById('custAddress').value;

    if(!name || !email || !phone || !address) {
        alert("Please fill all details! ✨");
        return;
    }

    const orderData = {
        name: name,
        email: email,
        phone: phone,
        address: address,
        orderDetails: cart.map(p => `${p.name} (x${p.qty})`).join(", "),
        total: total
    };

    // Send to Google Sheet
    fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData) })
    .then(() => {
        alert("Order Recorded! Opening Payment App...");
        // Redirect to UPI
        window.location.href = `upi://pay?pa=${myUpiId}&pn=NiftyKnots&am=${total}&tn=OrderFor${name}&cu=INR`;
        // Clear cart
        localStorage.setItem(cartKey, JSON.stringify([]));
    })
    .catch(() => alert("Error saving order. Please try again."));
}

renderCart();
</script>
</body>
</html>
