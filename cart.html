<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Checkout | Nifty Knots 🧶</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9E3; font-family: 'Quicksand', sans-serif; }
        .checkout-card { border: none; border-radius: 20px; background: white; padding: 20px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .total-row { font-weight: bold; font-size: 1.2rem; color: #C9B1FF; border-top: 2px dashed #eee; pt-2; }
        .btn-confirm { background: #C9B1FF; border: none; border-radius: 50px; font-weight: bold; color: white; padding: 12px; }
    </style>
</head>
<body>

<div class="container py-4">
    <h4 class="text-center mb-4" style="color: #C9B1FF;">Checkout 🛍️</h4>
    
    <div class="checkout-card shadow-sm mb-4">
        <h6>Order Summary</h6>
        <div id="cart-items-list" class="small mb-3"></div>
        
        <div class="summary-item"><span>Items Total:</span> <span id="subtotal">₹0</span></div>
        <div class="summary-item"><span>Shipping Fee:</span> <span id="shipping-fee">₹0</span></div>
        <div class="summary-item total-row"><span>Grand Total:</span> <span id="grand-total">₹0</span></div>
        <p id="shipping-note" class="text-muted" style="font-size: 0.7rem;"></p>
    </div>

   

<div class="p-3 bg-white rounded-4 shadow-sm mb-3">
    <h6 class="fw-bold mb-3">Delivery Address</h6>
    <input type="text" id="custName" class="form-control mb-2" placeholder="Full Name">
    
    <div class="input-group mb-2">
        <span class="input-group-text">🇮🇳 +91</span>
        <input type="tel" id="custPhone" class="form-control" placeholder="WhatsApp Number">
    </div>

    <select id="custState" class="form-select mb-2" onchange="calcShipping()">
        <option value="">Select Area</option>
        <option value="Gujarat">Gujarat (₹50 Shipping)</option>
        <option value="Other">Other India (₹60 Shipping)</option>
    </select>

    <input type="text" id="custCity" class="form-control mb-2" placeholder="City">
    <textarea id="custAddress" class="form-control" placeholder="House No, Landmark, Area..." oninput="calcShipping()"></textarea>
</div>
        <button class="btn btn-confirm w-100" onclick="processOrder()">Confirm & Pay</button>

        <div class="text-center mt-3">
            <p class="small text-muted mb-2">We accept UPI payments only</p>
            <div class="d-flex justify-content-center gap-3 opacity-75">
                <img src="https://img.icons8.com/color/48/google-pay-india.png" width="25">
                <img src="https://img.icons8.com/color/48/phone-pe.png" width="25">
                <img src="https://img.icons8.com/color/48/paytm.png" width="25">
                <img src="https://img.icons8.com/color/48/bhim.png" width="25">
            </div>
        </div>
    </div>
</div>

<script>
    let subtotal = 0;
    let shipping = 60;

    function loadCart() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const list = document.getElementById('cart-items-list');
        subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        list.innerHTML = cart.map(item => `
            <div class="d-flex justify-content-between">
                <span>${item.name} (x${item.qty})</span>
                <span>₹${item.price * item.qty}</span>
            </div>
        `).join('');
        
        document.getElementById('subtotal').innerText = "₹" + subtotal;
        calculateShipping();
    }

    function calculateShipping() {
        const state = document.getElementById('custState').value;
        const address = document.getElementById('custAddress').value.toLowerCase();
        const note = document.getElementById('shipping-note');
        
        // Local Free Delivery Check
        const localAreas = ['new ranip', 'ranip', 'gota', 'chandlodiya', 'chenpur'];
        const isLocal = localAreas.some(area => address.includes(area));

        if (isLocal) {
            shipping = 0;
            note.innerText = "✨ Local Free Delivery applied!";
        } else if (state === "Gujarat") {
            shipping = 50;
            note.innerText = "Gujarat Standard Shipping applied.";
        } else {
            shipping = 60;
            note.innerText = "All India Standard Shipping applied.";
        }

        document.getElementById('shipping-fee').innerText = "₹" + shipping;
        document.getElementById('grand-total').innerText = "₹" + (subtotal + shipping);
    }

    function processOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const state = document.getElementById('custState').value;
        const address = document.getElementById('custAddress').value;
        const finalAmount = subtotal + shipping;

        if(!name || phone.length < 10 || !state || !address) {
            // No alert popups, just change button text temporarily
            const btn = document.querySelector('.btn-confirm');
            btn.innerText = "Please fill all details!";
            btn.style.background = "#FF6B6B";
            setTimeout(() => { btn.innerText = "Confirm & Pay"; btn.style.background = "#C9B1FF"; }, 2000);
            return;
        }

        // Send to Apps Script (Replace with your actual URL)
        const scriptURL = "YOUR_APPS_SCRIPT_URL_HERE";
        
        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({
                name: name,
                phone: "+91" + phone,
                address: address + ", " + state,
                amount: finalAmount,
                email: document.getElementById('custEmail').value
            })
        }).then(() => {
            // Success Redirect or Payment UI
            window.location.href = `payment.html?amt=${finalAmount}`;
        });
    }

    window.onload = loadCart;
</script>
</body>
</html>
