<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Nifty Knots</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #FFF9E3, #FFE4F9, #EBE3FF); font-family: 'Quicksand', sans-serif; min-height: 100vh; }
        .checkout-box { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-top: 20px; }
        .form-control { border-radius: 12px; border: 1px solid #eee; padding: 12px; font-size: 0.9rem; margin-bottom: 10px; }
        .item-row { border-bottom: 1px solid #f9f9f9; padding-bottom: 10px; margin-bottom: 10px; }
        .btn-confirm { background: #C9B1FF; border: none; border-radius: 50px; color: white; font-weight: bold; padding: 15px; transition: 0.3s; }
        .btn-confirm:active { transform: scale(0.95); background: #b394ff; }
    </style>
</head>
<body>

<div class="container pb-5">
    <div class="checkout-box" id="main-content">
        <h4 style="color: #6a5acd; font-weight: 600;" class="mb-4">Bag Details 🛒</h4>
        <div id="cart-items"></div>
        <hr>
        <div class="d-flex justify-content-between mb-4">
            <h5>Total:</h5>
            <h5 id="total-price" style="color: #C9B1FF;">₹0</h5>
        </div>

        <h6 class="mb-3 mt-4">Delivery Details 🏡</h6>
        <input type="text" id="custName" class="form-control" placeholder="Full Name">
        <input type="email" id="custEmail" class="form-control" placeholder="Email Address">
        <input type="number" id="custPhone" class="form-control" placeholder="WhatsApp Number">
        
        <h6 class="mb-3 mt-3">Address</h6>
        <input type="text" id="addrHouse" class="form-control" placeholder="House/Flat No, Building Name">
        <input type="text" id="addrArea" class="form-control" placeholder="Street, Colony, Landmark">
        <div class="row g-2">
            <div class="col-6"><input type="text" id="addrCity" class="form-control" placeholder="City"></div>
            <div class="col-6"><input type="number" id="addrPin" class="form-control" placeholder="Pincode"></div>
        </div>

        <button onclick="processOrder()" id="submitBtn" class="btn btn-confirm w-100 mt-3">
            Confirm Order & Pay
        </button>
    </div>
</div>

<script>
    // 1. UPDATE THIS URL WITH YOUR GOOGLE SCRIPT URL
    const scriptURL = "https://script.google.com/macros/s/AKfycbyJa0LBmb66yiKjCh_w6LRaaFonQKmiuKg-0ryaEXr7QL1XVpM7JlWI8LeRUR83w5mu/exec";

    function loadCart() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let container = document.getElementById('cart-items');
        let total = 0;
        container.innerHTML = "";
        if(cart.length === 0) {
            container.innerHTML = "<p class='text-center'>Your bag is empty!</p>";
            document.getElementById('submitBtn').disabled = true;
        }
        cart.forEach(item => {
            total += item.price * item.qty;
            container.innerHTML += `
                <div class="d-flex justify-content-between item-row small">
                    <span>${item.name} (x${item.qty})</span>
                    <span>₹${item.price * item.qty}</span>
                </div>`;
        });
        document.getElementById('total-price').innerText = "₹" + total;
        return total;
    }

    const finalAmount = loadCart();

    function processOrder() {
        // Get all elements
        const name = document.getElementById('custName').value;
        const email = document.getElementById('custEmail').value;
        const phone = document.getElementById('custPhone').value;
        const house = document.getElementById('addrHouse').value;
        const area = document.getElementById('addrArea').value;
        const city = document.getElementById('addrCity').value;
        const pin = document.getElementById('addrPin').value;

        // Validation check
        if (!name || !email || !phone || !house || !area || !city || !pin) {
            alert("Oops! Please fill in all the details for delivery. 🧶");
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const fullAddr = `${house}, ${area}, ${city} - ${pin}`;
        const orderData = { name, email, phone, address: fullAddr, amount: finalAmount };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            body: JSON.stringify(orderData)
        })
        .then(() => {
            document.getElementById('main-content').innerHTML = `
                <div class="text-center py-4">
                    <h2 style="color: #C9B1FF;">Order Placed! 🥳</h2>
                    <div class="p-4 my-4" style="background: #FFF3AD; border-radius: 20px; border: 2px dashed #FFCAF2;">
                        <h6 class="mb-3">Final Step: Payment 💰</h6>
                        <p>Total to Pay: <b>₹${finalAmount}</b></p>
                        <a href="upi://pay?pa=kashishsoni0505-1@okaxis&pn=NiftyKnots&am=${finalAmount}&cu=INR" class="btn btn-primary w-100 py-3 mb-3" style="border-radius: 50px; font-weight:bold; background:#C9B1FF; border:none;">Tap to Pay Now</a>
                        <p class="small text-muted mb-2">OR Scan QR Code:</p>
                        <img src="myqr.png" style="width: 180px; border-radius: 10px; background: white; padding: 5px;">
                    </div>
                    <p class="small">Check your email for confirmation! We will start making your order soon. 🧶</p>
                    <button onclick="window.location.href='index.html'" class="btn btn-sm btn-outline-secondary">Return Home</button>
                </div>`;
            localStorage.setItem("cart", "[]");
        })
        .catch(err => {
            alert("Something went wrong. Please try again!");
            btn.innerText = "Confirm Order & Pay";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
