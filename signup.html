<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#FFF3AD,#FFCAF2,#C9B1FF);
font-family:'Quicksand';
}

.box{
max-width:400px;
margin:80px auto;
background:white;
padding:30px;
border-radius:20px;
text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h3>Create Account 💗</h3>

<input type="text" id="name" class="form-control mb-2" placeholder="Name">
<input type="email" id="email" class="form-control mb-2" placeholder="Email">
<input type="password" id="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-primary w-100" onclick="signup()">Signup</button>

<p class="mt-3">Already have an account?</p>
<a href="login.html">Login</a>

</div>

<script>

function signup(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

let users=JSON.parse(localStorage.getItem("users"))||[];

if(users.find(u=>u.email===email)){
alert("User already exists ❌");
return;
}

users.push({name,email,password});
localStorage.setItem("users", JSON.stringify(users));

alert("Account created 🎉");
window.location.href="login.html";
}

</script>

</body>
</html>
