<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Complete Payment | Nifty Knots 🧶</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9E3; font-family: 'Quicksand', sans-serif; text-align: center; padding: 20px; }
        .payment-card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .qr-code { width: 220px; height: 220px; border: 8px solid #FFF3AD; border-radius: 20px; margin: 20px 0; }
        .btn-pay { background: #C9B1FF; color: white; border-radius: 50px; font-weight: bold; padding: 15px; border: none; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container" style="max-width: 450px;">
    <div class="payment-card">
        <h2 style="color: #C9B1FF;">Almost There! ✨</h2>
        <p class="text-muted">Please complete the payment to confirm your handcrafted order.</p>
        
        <div class="text-center mt-4">
    <h4 class="mb-3">Total to Pay: <span id="display-amt" class="fw-bold" style="color: #C9B1FF;">₹0</span></h4>
    
    <button onclick="openUPI()" class="btn btn-lg w-100 py-3 text-white fw-bold shadow-sm" 
            style="background-color: #C9B1FF; border-radius: 15px;">
        Open Payment App ✨
    </button>
    
    <p class="text-muted mt-3" style="font-size: 0.8rem;">
        Clicking this will open GPay, PhonePe, or Paytm automatically.
    </p>
</div>

<script>
    // 1. Get the amount from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const amount = urlParams.get('amt') || "0";
    
    // 2. Display the amount on the page
    const displayAmtElement = document.getElementById('display-amt');
    if (displayAmtElement) {
        displayAmtElement.innerText = "₹" + amount;
    }

    function openUPI() {
    // 1. Using the official ID from your QR stand
    const upiId = "9376113566@okbizaxis"; 
    
    // 2. Updating the name to match your QR exactly
    const businessName = "Nifty.Knots"; 
    
    // 3. Generating a unique ID for this specific transaction
    const transactionRef = "NK" + Date.now(); 
    
    // 4. Constructing the link with the dot-enabled name
    // am = the amount from your cart
    // mc = 5947 (The code for Gift/Craft shops to help bank trust)
    const upiLink = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(businessName)}&am=${finalAmount}&cu=INR&mc=5947&tr=${transactionRef}&tn=OrderFromNiftyKnots`;

    // 5. Directing the phone to open GPay/PhonePe
    window.location.href = upiLink;
}
</script>
</body>
</html>
