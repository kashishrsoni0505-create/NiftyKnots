<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment | Nifty Knots 🧶</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9E3; font-family: 'Quicksand', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .payment-card { background: white; border-radius: 30px; padding: 40px 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 420px; width: 100%; text-align: center; }
        .amount-display { background: #F8F9FA; border-radius: 20px; padding: 15px; margin: 20px 0; border: 2px dashed #C9B1FF; }
        .qr-img { width: 280px; height: auto; border: 8px solid #FFF3AD; border-radius: 20px; padding: 5px; margin: 20px 0; }
        .instruction-text { color: #6A5ACD; font-weight: 600; font-size: 1.1rem; line-height: 1.4; }
    </style>
</head>
<body>

<div class="payment-card shadow-lg">
    <h2 style="color: #C9B1FF; font-weight: 700;">Almost There! ✨</h2>
    
    <div class="amount-display">
        <h4 class="mb-0" style="color: #555;">Total to Pay: <span id="display-amt" style="color: #C9B1FF; font-weight: 700;">₹0</span></h4>
    </div>

    <p class="instruction-text">
        Please take a screenshot of the QR code below and pay using any UPI app to confirm your order.
    </p>

    <img src="myqr.png" alt="Nifty Knots UPI QR" class="qr-img shadow-sm">

    <p class="text-muted mt-3" style="font-size: 0.85rem;">
        Scan with GPay, PhonePe, Paytm, or any bank app.
    </p>
</div>

<script>
    // Grabs the amount from your cart automatically
    const urlParams = new URLSearchParams(window.location.search);
    const finalAmount = urlParams.get('amt') || "0"; 
    document.getElementById('display-amt').innerText = "₹" + finalAmount;
</script>

</body>
</html>
