<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Complete Payment | Nifty Knots 🧶</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9E3; font-family: 'Quicksand', sans-serif; text-align: center; padding: 20px; }
        .payment-card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .qr-code { width: 220px; height: 220px; border: 8px solid #FFF3AD; border-radius: 20px; margin: 20px 0; }
        .btn-pay { background: #C9B1FF; color: white; border-radius: 50px; font-weight: bold; padding: 15px; border: none; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container" style="max-width: 450px; margin-top: 50px;">
    <div class="payment-card" style="background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;">
        
        <h2 style="color: #C9B1FF; font-family: 'Quicksand', sans-serif;">Almost There! ✨</h2>
        <p class="text-muted">Please complete the payment to confirm your handcrafted order.</p>

        <div class="py-3 mb-4" style="background: #F8F9FA; border-radius: 15px;">
            <h4 class="mb-0" style="color: #555;">Amount: <span id="display-amt" style="font-weight: 600;">₹0</span></h4>
        </div>

        <p style="font-weight: 600; color: #C9B1FF; margin-bottom: 15px;">
            Open your payment app and scan this QR code
        </p>

        <div class="position-relative d-inline-block">
            <img src="myqr.png" alt="Nifty.Knots QR" class="img-fluid" 
                 style="width: 280px; border-radius: 20px; border: 4px solid #FFF3AD; padding: 10px;">
        </div>

        <p class="text-muted mt-3" style="font-size: 0.85rem;">
            Scan to pay with any UPI app (GPay, PhonePe, Paytm)
        </p>
    </div>
</div>

<script>
    // Grabs the amount from the URL like payment.html?amt=100
    const urlParams = new URLSearchParams(window.location.search);
    const amount = urlParams.get('amt') || "0";
    document.getElementById('display-amt').innerText = "₹" + amount;
</script>
</body>
</html>
