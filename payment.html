<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Complete Payment | Nifty Knots 🧶</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9E3; font-family: 'Quicksand', sans-serif; text-align: center; padding: 20px; }
        .payment-card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .qr-code { width: 220px; height: 220px; border: 8px solid #FFF3AD; border-radius: 20px; margin: 20px 0; }
        .btn-pay { background: #C9B1FF; color: white; border-radius: 50px; font-weight: bold; padding: 15px; border: none; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container" style="max-width: 450px; margin-top: 50px;">
    <div class="payment-card" style="background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;">
        
        <h2 style="color: #C9B1FF; font-family: 'Quicksand', sans-serif;">Almost There! ✨</h2>
        <p class="text-muted">Please complete the payment to confirm your handcrafted order.</p>

        <div class="py-3 mb-4" style="background: #F8F9FA; border-radius: 15px;">
            <h4 class="mb-0" style="color: #555;">Amount: <span id="display-amt" style="font-weight: 600;">₹0</span></h4>
        </div>

       <div class="text-center mt-4">
    <button onclick="openUPI()" class="btn btn-lg w-100 py-3 text-white fw-bold shadow" 
            style="background: linear-gradient(135deg, #C9B1FF 0%, #B094FF 100%); border-radius: 15px; border: none; font-size: 1.2rem;">
        Open Payment App ✨
    </button>
    
    <p class="text-muted mt-3" style="font-size: 0.9rem;">
        Clicking will open GPay, PhonePe, or Paytm automatically.
    </p>
</div>
</div>

<script>
    function openUPI() {
        // 1. Get the amount from your URL (?amt=100)
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amt') || "1"; // Default to 1 for testing
        
        // 2. Official Merchant Info from your photos
        const upiId = "gpay-12204848614@okbizaxis"; 
        const businessName = "Nifty.Knots";
        
        // 3. Generate a unique Transaction Ref (helps bypass 'duplicate payment' errors)
        const txnId = "NK" + Math.floor(100000 + Math.random() * 900000);
        
        // 4. Construct the deep link
        // We include mc=5947 (Gift/Souvenir) to tell the bank you are a craft business
        const upiLink = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(businessName)}&am=${amount}&cu=INR&mc=5947&tr=${txnId}&tn=Order%20for%20Nifty.Knots`;

        // 5. Attempt to open the app
        window.location.href = upiLink;
    }
</script>
</body>
</html>
