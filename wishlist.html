<!DOCTYPE html>
<html>
<head>
<title>Wishlist</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  background: linear-gradient(135deg,#FFF3AD,#FFCAF2,#C9B1FF);
  font-family:'Quicksand';
}

.container-box{
  max-width:1000px;
  margin:60px auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.card{
  border:none;
  border-radius:15px;
  padding:15px;
  background:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card img{
  height:140px;
  object-fit:contain;
}

.title{
  text-align:center;
  margin-bottom:20px;
}
</style>
</head>

<body>

<button onclick="history.back()" class="btn btn-secondary m-3">← Back</button>

<div class="container-box">

<h2 class="title">❤️ Your Wishlist</h2>

<div class="row" id="box"></div>

</div>

<script>

let currentUser=JSON.parse(localStorage.getItem("currentUser"));

let cartKey="cart",wishlistKey="wishlist";
if(currentUser){
cartKey="cart_"+currentUser.email;
wishlistKey="wishlist_"+currentUser.email;
}

let wishlist=JSON.parse(localStorage.getItem(wishlistKey))||[];
let cart=JSON.parse(localStorage.getItem(cartKey))||[];

let box=document.getElementById("box");

if(wishlist.length===0){
box.innerHTML="<h5 class='text-center'>Your wishlist is empty 💔</h5>";
}

wishlist.forEach((p,i)=>{
box.innerHTML+=`
<div class="col-md-4 mb-4">
<div class="card text-center">

<img src="${p.img}">
<h5>${p.name}</h5>
<p>₹${p.price}</p>

<button onclick="add(${i})" class="btn btn-success mb-2">Add to Cart 🛒</button>
<button onclick="removeItem(${i})" class="btn btn-danger">Remove ❌</button>

</div>
</div>`;
});

function add(i){

let item = wishlist[i];

// ADD TO CART
let found = cart.find(x=>x.name===item.name);
if(found) found.qty++;
else cart.push({...item,qty:1});

// REMOVE FROM WISHLIST
wishlist.splice(i,1);

localStorage.setItem(cartKey,JSON.stringify(cart));
localStorage.setItem(wishlistKey,JSON.stringify(wishlist));

alert("Moved to cart 🛒");
location.reload();
}

function removeItem(i){
wishlist.splice(i,1);
localStorage.setItem(wishlistKey,JSON.stringify(wishlist));
location.reload();
}

</script>

</body>
</html>
