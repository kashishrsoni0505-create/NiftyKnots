<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nifty Knots | Handmade Joy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style> /* Insert CSS from Step 1 here */ </style>
</head>
<body>

<nav class="navbar custom-nav p-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <img src="niftyknotslogo.png" style="width:45px;" class="me-2">
            <h3 class="fw-bold mb-0" id="username" style="color: #6a5acd;">Nifty Knots 💗</h3>
        </div>

        <div class="search-container w-25 d-none d-md-block">
            <input class="form-control rounded-pill border-0 shadow-sm" id="search" placeholder="Search creations...">
        </div>

        <div class="d-flex gap-2 align-items-center">
            <button onclick="location.href='wishlist.html'" class="btn position-relative">
                <span class="fs-4">❤️</span>
            </button>
            <button onclick="location.href='cart.html'" class="btn position-relative">
                <span class="fs-4">🛒</span>
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </button>
            <div id="auth-buttons">
                <button onclick="location.href='login.html'" class="btn btn-main">Login</button>
            </div>
        </div>
    </div>
</nav>

<header class="container text-center py-5 glass-card mb-5">
    <h1 class="display-4 fw-bold">Handmade with Love 🧶</h1>
    <p class="lead">Discover unique crochet creations that add a pop of color to your life.</p>
</header>

<main class="container">
    <div class="row g-4" id="productList"></div>
</main>

<footer class="py-5 mt-5 text-center">
    <p>© 2026 Nifty Knots • Crafted with Passion</p>
</footer>

<script>
    // Improved Data Structure
    const products = [
        { id: 1, name: "Red Flower Keychain", price: 149, img: "product(k2).png", category: "Keychain" },
        { id: 2, name: "Pink Flower Keychain", price: 149, img: "product(k3).png", category: "Keychain" },
        { id: 3, name: "Scrunchie Rainbow", price: 149, img: "product(s2).png", category: "Accessories" },
        { id: 4, name: "Blue Keychain", price: 149, img: "product1(k1).png", category: "Keychain" }
    ];

    let currentUser = JSON.parse(localStorage.getItem("currentUser"));
    let cartKey = currentUser ? `cart_${currentUser.email}` : "cart";
    
    function updateUI() {
        if(currentUser) {
            document.getElementById("username").innerText = `Hi, ${currentUser.name} ✨`;
            document.getElementById("auth-buttons").innerHTML = `<button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>`;
        }
        let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
        document.getElementById("cart-count").innerText = cart.length;
    }

    function renderProducts(items) {
        const list = document.getElementById("productList");
        list.innerHTML = items.map(p => `
            <div class="col-6 col-md-4 col-lg-3">
                <div class="card glass-card h-100 p-2 border-0">
                    <img src="${p.img}" class="card-img-top rounded-4 mb-3" style="aspect-ratio: 1/1; object-fit: cover;">
                    <div class="card-body p-1 text-center">
                        <small class="text-uppercase text-muted fw-bold" style="font-size: 0.7rem;">${p.category}</small>
                        <h6 class="fw-bold mb-1">${p.name}</h6>
                        <p class="text-primary fw-bold mb-3">₹${p.price}</p>
                        <button onclick="addToCart(${p.id})" class="btn btn-main w-100">Add to Cart</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
        const product = products.find(p => p.id === id);
        const existing = cart.find(item => item.id === id);
        
        if(existing) existing.qty++;
        else cart.push({...product, qty: 1});
        
        localStorage.setItem(cartKey, JSON.stringify(cart));
        updateUI();
        // Modern Toast instead of Alert
        alert(`${product.name} added!`); 
    }

    function logout() {
        localStorage.removeItem("currentUser");
        location.reload();
    }

    // Initialize
    updateUI();
    renderProducts(products);

    // Search Logic
    document.getElementById("search").addEventListener("input", (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = products.filter(p => p.name.toLowerCase().includes(val));
        renderProducts(filtered);
    });
</script>
</body>
</html>
