<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Nifty Knots | Shop 🧶</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* THE NUCLEAR LIGHT MODE FIX */
        :root { color-scheme: light !important; }
        html, body { background-color: #FFF9E3 !important; color: #444 !important; }
        * { border-color: #eee !important; }

        .category-nav { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: white; white-space: nowrap; scrollbar-width: none; }
        .cat-item { padding: 8px 18px; border-radius: 50px; background: #f8f9fa; cursor: pointer; font-weight: 600; font-size: 0.8rem; color: #444; }
        .cat-active { background: #C9B1FF !important; color: white !important; }
        .product-card { border: none; border-radius: 20px; background: white !important; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .product-img { height: 160px; object-fit: cover; cursor: pointer; }
        .add-btn { width: 100%; border: 1px solid #C9B1FF; color: #C9B1FF; background: white; border-radius: 12px; font-weight: bold; padding: 5px; }
    </style>
</head>
<body>

<nav class="navbar bg-white px-3 sticky-top shadow-sm">
    <span class="fw-bold" style="color: #C9B1FF; font-size: 1.3rem;">Nifty Knots 🧶</span>
    <div onclick="window.location.href='cart.html'" style="cursor:pointer;">
        <img src="https://img.icons8.com/color/48/shopping-cart.png" width="30">
    </div>
</nav>

<div class="category-nav shadow-sm">
    <div class="cat-item cat-active" onclick="filterCat('All')">All Items</div>
    <div class="cat-item" onclick="filterCat('Keychains')">Keychains</div>
    <div class="cat-item" onclick="filterCat('Hair Accessories')">Hair Accessories</div>
    <div class="cat-item" onclick="filterCat('Purse/Pouch')">Purse/Pouch</div>
    <div class="cat-item" onclick="filterCat('Soft Toy')">Soft Toy</div>
    <div class="cat-item" onclick="filterCat('Flowers')">Flowers</div>
</div>

<div class="container mt-3">
    <div class="row g-2" id="product-display"></div>
</div>

<script>
    const products = [
        // 🌼 KEYCHAINS
        { id: "k1", cat: "Keychains", name: "Red Pearl Flower", price: 30, img: "red_pearl.png", desc: "Handmade pearl flower keychain." },
        { id: "k2", cat: "Keychains", name: "Falsa Pearl Flower", price: 30, img: "falsa_pearl.png", desc: "Handmade pearl flower keychain." },
        { id: "k3", cat: "Keychains", name: "Blue Evil Eye", price: 50, img: "Blue_Keychain.png", desc: "Blue crochet keychain." },
        { id: "k4", cat: "Keychains", name: "Pink Daisy", price: 50, img: "pink_daisy_Keychain.png", desc: "Pink daisy flower keychain." },
        { id: "k5", cat: "Keychains", name: "White Daisy", price: 50, img: "white_daisy_Keychain.png", desc: "White daisy flower keychain." },
        { id: "k6", cat: "Keychains", name: "Sunflower", price: 50, img: "sunflower_Keychain.png", desc: "Bright sunflower keychain." },
        { id: "k7", cat: "Keychains", name: "lavender Daisy", price: 50, img: "lavender_daisy_Keychain.png", desc: "lavender daisy flower keychain." },


        // 🎀 HAIR ACCESSORIES
        { id: "h1", cat: "Hair Accessories", name: "Red Scrunchie", price: 30, img: "red_scrunchie.png", desc: "Simple handmade red scrunchie." },
        { id: "h2", cat: "Hair Accessories", name: "Dark Blue Scrunchie", price: 30, img: "darkblue_scrunchie.png", desc: "Simple handmade dark blue scrunchie." },
        { id: "h3", cat: "Hair Accessories", name: "Pista Scrunchie", price: 30, img: "pista_scrunchie.png", desc: "Simple handmade pista green scrunchie." },
        { id: "h4", cat: "Hair Accessories", name: "Unicorn Double", price: 60, img: "unicorn_double.png", desc: "Double color unicorn shaded scrunchie." },
        { id: "h5", cat: "Hair Accessories", name: "Green Triple Layer", price: 70, img: "green_triple.png", desc: "Triple layer green & white scrunchie." },
        { id: "h6", cat: "Hair Accessories", name: "Brown Flower Clip", price: 25, img: "brown_flower_clip.png", desc: "Handmade brown flower hair clip." },
        { id: "h7", cat: "Hair Accessories", name: "Yellow Flower Clip", price: 25, img: "yellow_flower_clip.png", desc: "Handmade yellow flower hair clip." },
        { id: "h8", cat: "Hair Accessories", name: "Dark Green Band", price: 80, img: "dark_green_hair_band.png", desc: "Handmade dark green hair band." },

        // 👜 PURSE / POUCHES
        { id: "p1", cat: "Purse/Pouch", name: "Rose Pink Mobile Cover", price: 150, img: "rosepink_crossbody_purse.png", desc: "Cross body crochet mobile cover." },
        { id: "p2", cat: "Purse/Pouch", name: "Blue Mobile Cover", price: 150, img: "blue_mobilecover_crossbody_purse.png", desc: "Cross body crochet mobile cover." },
        { id: "p3", cat: "Purse/Pouch", name: "Unicorn Purse", price: 250, img: "unicorn_crossbody_purse.png", desc: "Handmade unicorn shades purse." },
        { id: "p4", cat: "Purse/Pouch", name: "Green Bow Purse", price: 300, img: "green_bow_purse.png", desc: "Elegant green bow cross body purse." },
        { id: "p5", cat: "Purse/Pouch", name: "Mini Potli Pouch", price: 150, img: "mini_potli_pouch.png", desc: "Small handmade cream & maroon potli." },

        // 🧸 SOFT TOYS
        { id: "s1", cat: "Soft Toy", name: "Pink Rabbit", price: 190, img: "pink_rabbit_soft_toy.png", desc: "Cute handmade pink rabbit soft toy." },
        { id: "s2", cat: "Soft Toy", name: "Photo Frame", price: 399, img: "rose_flower_photo_frame.png", desc: "Handmade rose flower photo frame." },

        // 🌹 FLOWERS
        { id: "f1", cat: "Flowers", name: "Pink Rose Pot", price: 180, img: "rosepink_flowerpot.png", desc: "Handmade pink rose flower pot." },
        { id: "f2", cat: "Flowers", name: "Yellow Rose Pot", price: 180, img: "yellowrose_flowerpot.png", desc: "Handmade yellow rose flower pot." },
        { id: "f3", cat: "Flowers", name: "Peach Rose Pot", price: 180, img: "peachrose_flowerpot.png", desc: "Handmade peach rose flower pot." }
    ];

    let currentCat = "All";

    function filterCat(cat) {
        currentCat = cat;
        // Update button visual state
        document.querySelectorAll('.cat-item').forEach(el => {
            el.classList.toggle('cat-active', el.innerText === cat || (cat === 'All' && el.innerText === 'All Items'));
        });
        renderProducts();
    }

    function renderProducts() {
        const display = document.getElementById('product-display');
        // Logic to filter by category or show all
        const filtered = currentCat === "All" ? products : products.filter(p => p.cat === currentCat);
        
        display.innerHTML = filtered.map(p => `
            <div class="col-6">
                <div class="product-card p-2">
                    <img src="${p.img}" class="product-img w-100 rounded-4" onclick="window.location.href='product.html?id=${p.id}'" onerror="this.src='https://via.placeholder.com/150?text=Nifty+Knots'">
                    <h6 class="mt-2 mb-0 small fw-bold">${p.name}</h6>
                    <span class="text-muted small">₹${p.price}</span>
                    <button class="add-btn mt-2" onclick="window.location.href='product.html?id=${p.id}'">VIEW</button>
                </div>
            </div>
        `).join('');
    }

    window.onload = renderProducts;
</script>
</body>
</html>
