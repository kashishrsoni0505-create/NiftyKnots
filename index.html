<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Nifty Knots | Crochet Shop 🧶</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p-purple: #C9B1FF; --p-yellow: #FFF3AD; --p-pink: #FFCAF2; }
        body { background-color: #FFF9E3; font-family: 'Quicksand', sans-serif; }
        
        /* Category Navigation */
        .category-nav { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: white; white-space: nowrap; scrollbar-width: none; }
        .cat-item { padding: 8px 20px; border-radius: 50px; background: #f0f0f0; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .cat-active { background: var(--p-purple); color: white; }

        /* Cart Badge */
        .cart-btn { position: relative; cursor: pointer; }
        #cart-badge { position: absolute; top: -5px; right: -5px; background: #FF6B6B; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; display: none; }

        /* Product Grid */
        .product-card { border: none; border-radius: 20px; background: white; overflow: hidden; margin-bottom: 15px; }
        .product-img { height: 180px; object-fit: cover; cursor: pointer; }
        
        /* Blinkit Buttons */
        .btn-qty-container { min-height: 35px; }
        .add-btn { width: 100%; border: 1px solid var(--p-purple); color: var(--p-purple); background: white; border-radius: 8px; font-weight: bold; }
        .qty-controls { display: flex; justify-content: space-between; align-items: center; background: var(--p-purple); color: white; border-radius: 8px; padding: 0 10px; }
        .qty-controls button { background: none; border: none; color: white; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<nav class="navbar bg-white px-3 sticky-top shadow-sm">
    <span class="fw-bold" style="color: var(--p-purple); font-size: 1.2rem;">Nifty Knots 🧶</span>
    <div class="cart-btn" onclick="window.location.href='cart.html'">
        <img src="https://img.icons8.com/color/48/shopping-cart.png" width="30">
        <span id="cart-badge">0</span>
    </div>
</nav>

<div class="category-nav shadow-sm" id="category-bar">
    <div class="cat-item cat-active" onclick="filterCat('All')">All</div>
    <div class="cat-item" onclick="filterCat('Keychains')">Keychains</div>
    <div class="cat-item" onclick="filterCat('Coasters')">Coasters</div>
    <div class="cat-item" onclick="filterCat('Toys')">Toys</div>
    <div class="cat-item" onclick="filterCat('Accessories')">Accessories</div>
</div>

<div class="container mt-3">
    <div class="row g-2" id="product-display"></div>
</div>

<script>
    // 🧶 ADD ALL YOUR PRODUCTS HERE 🧶
    const products = [
        { id: "k1", cat: "Keychains", name: "Flower Keychain", price: 120, img: "flower.jpg", desc: "A soft handmade flower for your keys." },
        { id: "c1", cat: "Coasters", name: "Daisy Coaster", price: 80, img: "coaster.jpg", desc: "Keep your desk pretty and dry." },
        { id: "t1", cat: "Toys", name: "Bee Plushie", price: 250, img: "bee.jpg", desc: "Squishy handmade bumblebee." },
        // Add more products with the same format...
    ];

    let currentCat = "All";

    function filterCat(cat) {
        currentCat = cat;
        // UI color change
        document.querySelectorAll('.cat-item').forEach(el => {
            el.classList.remove('cat-active');
            if(el.innerText === cat) el.classList.add('cat-active');
        });
        renderProducts();
    }

    function renderProducts() {
        const display = document.getElementById('product-display');
        const filtered = currentCat === "All" ? products : products.filter(p => p.cat === currentCat);
        
        display.innerHTML = filtered.map(p => `
            <div class="col-6">
                <div class="product-card shadow-sm p-2">
                    <img src="${p.img}" class="product-img w-100 mb-2 rounded" onclick="window.location.href='product-detail.html?id=${p.id}'">
                    <h6 class="mb-0 text-truncate">${p.name}</h6>
                    <p class="small text-muted mb-2">₹${p.price}</p>
                    <div id="qty-${p.id}" class="btn-qty-container">
                        ${getButtonUI(p.id)}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function getButtonUI(id) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let item = cart.find(i => i.id === id);
        if(!item) return `<button class="add-btn py-1" onclick="updateQty('${id}', 1)">ADD</button>`;
        return `<div class="qty-controls">
            <button onclick="updateQty('${id}', -1)">−</button>
            <span>${item.qty}</span>
            <button onclick="updateQty('${id}', 1)">+</button>
        </div>`;
    }

    function updateQty(id, delta) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let pIndex = cart.findIndex(i => i.id === id);
        if(pIndex > -1) {
            cart[pIndex].qty += delta;
            if(cart[pIndex].qty <= 0) cart.splice(pIndex, 1);
        } else {
            let p = products.find(i => i.id === id);
            cart.push({...p, qty: 1});
        }
        localStorage.setItem("cart", JSON.stringify(cart));
        renderProducts();
        updateBadge();
    }

    function updateBadge() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let count = cart.reduce((s, i) => s + i.qty, 0);
        let b = document.getElementById('cart-badge');
        b.style.display = count > 0 ? 'block' : 'none';
        b.innerText = count;
    }

    window.onload = () => { renderProducts(); updateBadge(); };
</script>
</body>
</html>
