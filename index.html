<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty Knots | Handmade Crochet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #FFF9E3, #FFE4F9, #EBE3FF); 
            font-family: 'Quicksand', sans-serif; 
            min-height: 100vh;
            color: #4A4A4A;
        }
        .header { text-align: center; padding: 40px 20px; }
        .logo { width: 80px; margin-bottom: 10px; border-radius: 50%; }
        .category-card {
            background: white;
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            transition: 0.3s;
            text-decoration: none;
            color: #333;
            display: block;
            border: 2px solid transparent;
        }
        .category-card:active { transform: scale(0.95); background: #fdf2f8; border-color: #FFCAF2; }
        .cat-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        .footer-text { font-size: 0.8rem; text-align: center; padding: 20px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="niftyknotslogo.png" class="logo" alt="Nifty Knots">
        <h1 style="color: #C9B1FF; font-weight: 600;">Nifty Knots 🧶</h1>
        <p class="small">Handmade with love, just for you.</p>
    </div>

    <div class="row px-2">
        <div class="col-6">
            <a href="shop.html?cat=Keychains" class="category-card">
                <span class="cat-icon">🌸</span>
                <h6>Keychains</h6>
            </a>
        </div>
        <div class="col-6">
            <a href="shop.html?cat=Hair" class="category-card">
                <span class="cat-icon">🎀</span>
                <h6>Hair Accessories</h6>
            </a>
        </div>
        <div class="col-6">
            <a href="shop.html?cat=Purse" class="category-card">
                <span class="cat-icon">👜</span>
                <h6>Purse/Pouches</h6>
            </a>
        </div>
        <div class="col-6">
            <a href="shop.html?cat=Toys" class="category-card">
                <span class="cat-icon">🧸</span>
                <h6>Soft Toys</h6>
            </a>
        </div>
        <div class="col-12">
            <a href="shop.html?cat=Flowers" class="category-card">
                <span class="cat-icon">💐</span>
                <h6>Flowers/Bouquets</h6>
            </a>
        </div>
    </div>

    <div class="footer-text">
        © 2026 Nifty Knots | Created by Kashish Soni
    </div>
</div>

</body>
</html>
