<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Product Details | Nifty Knots</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #FFF9E3; font-family: 'Quicksand', sans-serif; }
        .product-img-large { width: 100%; height: 420px; object-fit: cover; border-radius: 0 0 45px 45px; }
        .content-card { padding: 30px; background: white; margin-top: -40px; border-radius: 45px 45px 0 0; position: relative; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); }
        .wide-qty { background: #f8f9fa; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; margin: 25px 0; border: 1px solid #eee; }
        .btn-main { width: 100%; padding: 16px; border-radius: 50px; border: none; font-weight: 700; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div id="product-details"></div>
<script>
    const products = [ /* Copy EXACT SAME products list from index.html here */ ];
    const pid = new URLSearchParams(window.location.search).get('id');
    const p = products.find(i => i.id === pid);

    if(p) {
        document.getElementById('product-details').innerHTML = `
            <div onclick="history.back()" style="position:absolute; top:25px; left:25px; background:white; border-radius:50%; padding:10px; z-index:100; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">←</div>
            <img src="${p.img}" class="product-img-large">
            <div class="content-card">
                <h2 class="fw-bold" style="color: #C9B1FF;">${p.name}</h2>
                <p class="text-muted mb-2">${p.desc}</p>
                <h4 class="fw-bold">₹${p.price}</h4>

                <div class="wide-qty">
                    <button class="btn fw-bold" onclick="changeQty(-1)">−</button>
                    <span id="qty-count" class="fs-5 fw-bold">1</span>
                    <button class="btn fw-bold" onclick="changeQty(1)">+</button>
                </div>

                <button class="btn-main" style="background:#FFF3AD; color:#444;" onclick="addToCart()">Add to Cart 🛒</button>
                <button class="btn-main" style="background:#C9B1FF; color:white;" onclick="buyNow()">Buy Now ✨</button>
            </div>
        `;
    }

    let qty = 1;
    function changeQty(d) { qty = Math.max(1, qty + d); document.getElementById('qty-count').innerText = qty; }

    function addToCart() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push({...p, qty: qty});
        localStorage.setItem("cart", JSON.stringify(cart));
        window.location.href = 'index.html';
    }

    function buyNow() {
        localStorage.setItem("cart", JSON.stringify([{...p, qty: qty}]));
        window.location.href = 'cart.html';
    }
</script>
</body>
</html>
