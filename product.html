        :root { color-scheme: light !important; }

        .product-container { background: white; border-radius: 30px; padding: 25px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .back-btn { background: #f8f9fa; border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .back-btn:hover { background: #C9B1FF; color: white; }
        .main-img { border-radius: 20px; width: 100%; height: auto; max-height: 400px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .price-tag { color: #C9B1FF; font-size: 1.8rem; font-weight: bold; margin: 15px 0; }
        .qty-box { display: flex; align-items: center; gap: 15px; background: #f8f9fa; border-radius: 50px; padding: 8px 20px; width: fit-content; }
        .qty-btn { border: none; background: none; font-size: 1.5rem; font-weight: bold; color: #C9B1FF; cursor: pointer; }
        .btn-add { background: #C9B1FF; color: white; border: none; border-radius: 50px; padding: 16px; width: 100%; font-weight: bold; font-size: 1.2rem; transition: 0.3s; margin-top: 20px; }
        .btn-add:hover { background: #b59ae6; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(201, 177, 255, 0.4); }
        .product-cat { text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; color: #888; font-weight: bold; }
    </style>
</head>

        { id: "f1", cat: "Flowers", name: "Pink Rose Pot", price: 180, img: "rosepink_flowerpot.png", desc: "Handmade pink rose flower pot." },
        { id: "f2", cat: "Flowers", name: "Yellow Rose Pot", price: 180, img: "yellowrose_flowerpot.png", desc: "Handmade yellow rose flower pot." },
        { id: "f3", cat: "Flowers", name: "Coral Rose Pot", price: 180, img: "coralrose_flowerpot.png", desc: "Handmade coral rose flower pot." } , 
        { id: "f4", cat: "Flowers", name: "Rose Flower Bouquet", price: 350, img: "rose_flower_bouquet.png", desc: "Handmade rose flower bouquet." }
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const product = products.find(p => p.id === productId);

    function renderProduct() {
        const container = document.getElementById('product-content');
        if (!product) {
            container.innerHTML = "<h3 class='text-center'>Item not found! 🧶</h3>";
            return;
        }

        container.innerHTML = `
            <div class="product-cat">${product.cat}</div>
            <img src="${product.img}" class="main-img mt-2 mb-4" onerror="this.src='https://via.placeholder.com/400?text=Product+Image'">
            <h2 class="fw-bold">${product.name}</h2>
            <p class="text-muted">${product.desc}</p>
            <div class="price-tag">₹${product.price}</div>
            
            <div class="d-flex align-items-center justify-content-between my-4">
                <span class="fw-bold">Quantity:</span>
                <div class="qty-box">
                    <button class="qty-btn" onclick="updateQty(-1)">-</button>
                    <span id="qty-val" class="fw-bold">1</span>
                    <button class="qty-btn" onclick="updateQty(1)">+</button>
                </div>
            </div>

            <button class="btn-add" onclick="addToCart()">Add to Cart 🛍️</button>
        `;
    }

    let currentQty = 1;
    function updateQty(val) {
        currentQty = Math.max(1, currentQty + val);
        document.getElementById('qty-val').innerText = currentQty;
    }

    function addToCart() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const existing = cart.find(i => i.id === product.id);
        
        if (existing) {
            existing.qty += currentQty;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                qty: currentQty,
                img: product.img
            });
        }
        
        localStorage.setItem('cart', JSON.stringify(cart));
        alert("Added to your basket! ✨");
        window.location.href = "cart.html";
    }

    window.onload = renderProduct;
</script>
