<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #FFF9E3 !important; color: #444 !important; font-family: 'Quicksand', sans-serif; }
        .big-img { width: 100%; height: 400px; object-fit: cover; border-radius: 0 0 40px 40px; }
        .card-body-custom { background: white; margin-top: -30px; border-radius: 40px 40px 0 0; padding: 30px; position: relative; min-height: 500px; }
        .wide-qty { background: #f8f9fa; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; padding: 15px; margin: 20px 0; border: 1px solid #eee; }
        .btn-buy { background: #C9B1FF; color: white; border-radius: 50px; width: 100%; padding: 15px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui-content"></div>

<script>
    const products = [
        { id: "k1", name: "RedPearl Flower", price: 30, img: "red_pearl.png", desc: "Handmade flower keychain[cite: 1]." },
        { id: "h1", name: "Red Scrunchie", price: 30, img: "red_scrunchie.png", desc: "Simple crochet scrunchie[cite: 1]." },
        { id: "p1", name: "Granny Square Pouch", price: 100, img: "square_pouch.png", desc: "Handmade square pouch[cite: 1]." },
        { id: "s1", name: "Mini Rabbit", price: 150, img: "mini_rabbit_soft_toy.png", desc: "Handmade soft toy[cite: 1]." }
    ];

    const pid = new URLSearchParams(window.location.search).get('id');
    const p = products.find(i => i.id === pid);

    if(p) {
        document.getElementById('ui-content').innerHTML = `
            <div onclick="history.back()" style="position:absolute; top:20px; left:20px; background:white; border-radius:50%; padding:10px; z-index:10; cursor:pointer;">←</div>
            <img src="${p.img}" class="big-img shadow">
            <div class="card-body-custom shadow">
                <h2 style="color: #C9B1FF;">${p.name}</h2>
                <p class="text-muted">${p.desc}</p>
                <h4 class="fw-bold">₹${p.price}</h4>
                <div class="wide-qty">
                    <button class="btn fw-bold" onclick="changeQty(-1)">−</button>
                    <span id="qty" class="fs-4 fw-bold">1</span>
                    <button class="btn fw-bold" onclick="changeQty(1)">+</button>
                </div>
                <button class="btn-buy" onclick="buyNow()">Confirm & Add to Cart ✨</button>
            </div>
        `;
    } else {
        document.body.innerHTML = "<h2 class='text-center mt-5'>Product not found. Please go back.</h2>";
    }

    let qtyVal = 1;
    function changeQty(d) {
        qtyVal = Math.max(1, qtyVal + d);
        document.getElementById('qty').innerText = qtyVal;
    }

    function buyNow() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push({...p, qty: qtyVal});
        localStorage.setItem("cart", JSON.stringify(cart));
        window.location.href = 'cart.html';
    }
</script>
</body>
</html>
